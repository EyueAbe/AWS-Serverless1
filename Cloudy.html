<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloudy — Your AWS Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0a0e1a;
      color: #e2e8f0;
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* AUTH SCREEN */
    #auth-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #0a0e1a;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background-color: #111827;
      border: 1px solid #1e2d47;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-logo .icon {
      font-size: 42px;
      display: block;
    }

    .auth-logo h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-top: 10px;
    }

    .auth-logo h1 span {
      color: #f59e0b;
    }

    .auth-logo p {
      font-size: 0.78rem;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background-color: #1a2236;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background-color: transparent;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .auth-tab.active {
      background-color: #f59e0b;
      color: #0a0e1a;
      font-weight: 700;
    }

    .field-label {
      display: block;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: #64748b;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      background-color: #1a2236;
      border: 1px solid #1e2d47;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e2e8f0;
      font-size: 0.88rem;
      outline: none;
      margin-bottom: 14px;
    }

    .field-input:focus {
      border-color: #f59e0b;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #f59e0b;
      border: none;
      border-radius: 10px;
      color: #0a0e1a;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }

    .submit-btn:hover {
      background-color: #f97316;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .divider {
      text-align: center;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      margin: 18px 0;
    }

    .guest-btn {
      width: 100%;
      padding: 11px;
      background-color: transparent;
      border: 1px solid #1e2d47;
      border-radius: 10px;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .guest-btn:hover {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    #auth-message {
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
      padding: 4px 8px;
    }

    .msg-error   { color: #ef4444; }
    .msg-success { color: #34d399; }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background-color: #0d1526;
      border-bottom: 1px solid #1e2d47;
      position: relative;
      z-index: 10;
    }

    .logo-box {
      width: 40px;
      height: 40px;
      background-color: #f59e0b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-title {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .logo-title span {
      color: #f59e0b;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #user-badge {
      background-color: #0f2a1a;
      border: 1px solid #34d399;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 0.68rem;
      font-family: 'Space Mono', monospace;
      color: #34d399;
    }

    #logout-btn {
      background: none;
      border: 1px solid #1e2d47;
      border-radius: 6px;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 4px 10px;
      cursor: pointer;
    }

    #logout-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* TOPIC CHIPS */
    .topic-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background-color: #111827;
      border-bottom: 1px solid #1e2d47;
      overflow-x: auto;
    }

    .chip {
      flex-shrink: 0;
      background-color: #1a2236;
      border: 1px solid #1e2d47;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: #64748b;
      cursor: pointer;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: #f59e0b;
      color: #f59e0b;
    }

    /* CHAT */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex: 1;
      gap: 14px;
      padding: 40px 20px;
    }

    #welcome .big-icon {
      font-size: 52px;
    }

    #welcome h2 {
      font-size: 1.8rem;
      font-weight: 800;
    }

    #welcome h2 span {
      color: #f59e0b;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .tag {
      background-color: #1a2236;
      border: 1px solid #1e2d47;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: #64748b;
    }

    /* MESSAGES */
    .msg-row {
      display: flex;
      gap: 12px;
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-avatar.bot  { background-color: #f59e0b; }
    .msg-avatar.user { background-color: #38bdf8; }

    .msg-bubble {
      max-width: 80%;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.65;
    }

    .msg-bubble.bot {
      background-color: #141e2f;
      border: 1px solid #1e2d47;
      border-top-left-radius: 4px;
    }

    .msg-bubble.user {
      background-color: #1e3a5f;
      border: 1px solid #1e4a6f;
      border-top-right-radius: 4px;
    }

    .msg-name {
      font-size: 0.67rem;
      font-family: 'Space Mono', monospace;
      margin-bottom: 6px;
    }

    .msg-bubble.bot  .msg-name { color: #f59e0b; }
    .msg-bubble.user .msg-name { color: #38bdf8; text-align: right; }

    .msg-bubble strong { color: #f59e0b; }
    .msg-bubble code {
      font-family: 'Space Mono', monospace;
      font-size: 0.8em;
      background-color: #0d1526;
      border-radius: 5px;
      padding: 1px 6px;
      color: #34d399;
    }
    .msg-bubble pre {
      background-color: #0d1526;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: 'Space Mono', monospace;
      font-size: 0.78em;
      color: #34d399;
    }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 6px 0; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble p  { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }

    .save-note {
      font-size: 0.62rem;
      font-family: 'Space Mono', monospace;
      color: #34d399;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }

    /* TYPING DOTS */
    .typing {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
      background-color: #141e2f;
      border: 1px solid #1e2d47;
      border-radius: 14px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .dot {
      width: 7px;
      height: 7px;
      background-color: #f59e0b;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* INPUT AREA */
    .input-area {
      padding: 14px 20px 18px;
      background-color: #111827;
      border-top: 1px solid #1e2d47;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background-color: #1a2236;
      border: 1px solid #1e2d47;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .input-row:focus-within {
      border-color: #f59e0b;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
    }

    #user-input::placeholder {
      color: #64748b;
    }

    #send-btn {
      width: 38px;
      height: 38px;
      background-color: #f59e0b;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover   { background-color: #f97316; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #0a0e1a; }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .hint-text {
      font-size: 0.67rem;
      font-family: 'Space Mono', monospace;
      color: #64748b;
    }

    #msg-count {
      font-size: 0.67rem;
      font-family: 'Space Mono', monospace;
      color: #38bdf8;
      background-color: #0a1a2a;
      border: 1px solid #1e3a5f;
      border-radius: 999px;
      padding: 3px 10px;
    }

    #clear-btn {
      background: none;
      border: 1px solid #1e2d47;
      border-radius: 6px;
      color: #64748b;
      font-family: 'Space Mono', monospace;
      font-size: 0.67rem;
      padding: 3px 10px;
      cursor: pointer;
    }

    #clear-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="icon">☁️</span>
      <h1>Hey I'm <span>Cloudy</span></h1>
      <p>your AWS guide</p>
    </div>

    <!-- Sign In / Sign Up tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Sign In</button>
      <button class="auth-tab"        onclick="showTab('signup')">Create Account</button>
    </div>

    <!-- Login form -->
    <div id="login-form">
      <label class="field-label">Email</label>
      <input class="field-input" type="email" id="login-email" placeholder="you@example.com"/>
      <label class="field-label">Password</label>
      <input class="field-input" type="password" id="login-pass" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') login()"/>
      <button class="submit-btn" onclick="login()">Sign In</button>
    </div>

    <!-- Signup form -->
    <div id="signup-form" style="display:none">
      <label class="field-label">Email</label>
      <input class="field-input" type="email" id="signup-email" placeholder="you@example.com"/>
      <label class="field-label">Password (min 8 chars)</label>
      <input class="field-input" type="password" id="signup-pass" placeholder="••••••••"/>
      <button class="submit-btn" onclick="signup()">Create Account</button>
    </div>

    <!-- Verify email form -->
    <div id="verify-form" style="display:none">
      <p style="font-size:0.8rem;color:#64748b;font-family:'Space Mono',monospace;margin-bottom:16px;text-align:center">
        Check your email for a verification code
      </p>
      <label class="field-label">Verification Code</label>
      <input class="field-input" type="text" id="verify-code" placeholder="123456"
             onkeydown="if(event.key==='Enter') verify()"/>
      <button class="submit-btn" onclick="verify()">Verify & Sign In</button>
    </div>

    <div id="auth-message"></div>

    <div class="divider">— or —</div>
    <button class="guest-btn" onclick="guestMode()">Continue as Guest — no account needed</button>

  </div>
</div>

<!-- MAIN APP -->
<header>
  <div class="logo-box">☁️</div>
  <div class="logo-title">Cloudy <span>//</span> AWS Guide</div>
  <div class="header-right">
    <div id="user-badge">online</div>
    <button id="logout-btn" onclick="logout()">sign out</button>
  </div>
</header>

<div class="topic-bar">
  <di
